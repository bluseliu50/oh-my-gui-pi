name: oh-my-gui-pi CI

on:
  push:
    branches: [main]
    tags: ["gui-v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.3.12"

jobs:
  desktop_build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
      - run: bun install --frozen-lockfile
      - name: Build desktop app
        run: bun --cwd=packages/coding-agent run desktop:build
      - name: Verify desktop outputs
        run: |
          test -f packages/coding-agent/dist/desktop/main.cjs
          test -f packages/coding-agent/dist/desktop/preload.cjs
          test -f packages/coding-agent/dist/desktop/backend.js
          test -f packages/coding-agent/dist/desktop/renderer/index.html
      - name: Upload desktop build
        uses: actions/upload-artifact@v4
        with:
          name: desktop-dist
          path: packages/coding-agent/dist/desktop
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/gui-v')
    needs: [desktop_build]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download desktop build
        uses: actions/download-artifact@v4
        with:
          name: desktop-dist
          path: release/desktop
      - name: Package desktop build
        run: |
          mkdir -p release
          cd release/desktop
          zip -qr ../oh-my-gui-pi-${{ github.ref_name }}-desktop.zip .
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/oh-my-gui-pi-${{ github.ref_name }}-desktop.zip
          generate_release_notes: true